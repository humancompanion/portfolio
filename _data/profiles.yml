# _data/profiles.yml
# Selectable Profile blurbs for the resume.
#
# Choose which version renders by setting `profile: <key>` in the front matter
# of pages/resume/index.html (e.g. `profile: v1`). If unset, `v2` is used.
#
# `label` and `audience` are notes to help pick a version — they are NOT shown
# on the resume. Only `paragraphs` renders (one <p class="enlarge"> per item).

v1:
  label: Version 1 — Leads with persistence, earns the AI angle
  audience: civic tech contractors, mission-driven orgs
  paragraphs:
    - "I'm a human-centered designer and front-end developer with 30 years of experience building software that improves people's lives. I specialize in the hardest design problems — the ones that take years, not sprints, to move — and I stay with them until they change."
    - "Over the last decade in public service, I've led design systems, reformed federal hiring, helped prevent Veterans from losing benefits claims without notification, and secured $7.4M in federal investment to modernize how government builds digital forms. As AI has reshaped how designers work, I've focused less on whether it threatens the craft and more on building the tools and infrastructure that help designers use it well."

v2:
  label: Version 2 — Leads with the builder angle, earns the leader angle
  audience: private sector roles where technical fluency is a differentiator
  paragraphs:
    - "I'm a designer who builds — and a leader who thinks carefully about how designers do their best work. With 30 years of experience spanning Silicon Valley engineering and a decade of public service, I bring an unusual combination of front-end fluency, systems thinking, and human-centered practice to complex, multi-year problems."
    - "I've shipped design systems used by millions, led cross-functional teams through Congressional scrutiny, and built open-source AI tooling that helps designers prototype accessible Veteran-facing products in days instead of weeks. The work I'm most proud of isn't the launches — it's the problems I didn't walk away from."

v3:
  label: Version 3 — Shortest, most confident
  audience: situations where brevity signals seniority
  paragraphs:
    - "I'm a human-centered designer and front-end developer with 30 years of experience who stays with hard problems long enough to actually solve them. In the last decade I've led design systems, secured $7.4M in federal investment to modernize how government builds software, and built open-source AI prototyping tools that help designers ship accessible products faster."
    - "I believe the most important thing a design leader can do right now is help their team work with AI without losing their craft — and I've been doing that work rather than just talking about it."

v4:
  label: Version 4 — Most personal, most distinctive
  audience: when you want to stand out from leaders who lead from a distance
  paragraphs:
    - "I've spent 30 years building software that improves people's lives — and the last decade doing that inside the federal government, where almost nothing moves fast and almost everything matters. I'm a designer who writes code, a leader who builds tools for my team, and someone who has stayed focused on the mission through some genuinely difficult years: a hostile administration, an AI disruption that's reshaped the field, and the particular challenge of fixing government systems that were never designed to be fixed."
    - "The work I'm most proud of isn't the launches — it's the problems I didn't walk away from."
